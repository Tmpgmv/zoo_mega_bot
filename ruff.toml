# ruff.toml - конфигурация для линтера и форматтера Ruff

# Исключаем лишние директории
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "migrations",
    "media",
    "static",
]

# Целевая версия Python
target-version = "py314"

# Максимальная длина строки (для форматтера и линтера)
line-length = 100

# Правила линтинга
[lint]
# Выбираем набор правил
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort (сортировка импортов)
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "DJ",  # flake8-django
    "SIM", # flake8-simplify
    "TID", # flake8-tidy-imports
    "RUF", # Ruff specific rules
]

# Игнорируем некоторые правила
ignore = [
    "E501",   # ignore long lines (let formatter handle it)
    "DJ008",  # ignore missing __str__ in Django models
    "DJ012",  # ignore order of model inner classes
]

# Настройки сортировки импортов
[lint.isort]
known-first-party = ["zoo", "telegram"]
force-single-line = false
lines-after-imports = 2

# Настройка сложности (mccabe)
[lint.mccabe]
# Максимальная сложность функций (цикломатическая сложность)
max-complexity = 10

# Настройки форматирования
[format]
# Использовать кавычки
quote-style = "double"
# Отступы
indent-style = "space"
# Переносы строк
line-ending = "auto"
# Форматирование docstring
docstring-code-format = false
# Пропускать магические запятые
skip-magic-trailing-comma = false